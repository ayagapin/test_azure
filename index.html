<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Projet Azure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🚀 Mon Premier Déploiement Azure !</h1>
        <p>Ceci est un petit projet pour apprendre à déployer gratuitement sur Microsoft Azure.</p>
        <button id="actionBtn">Cliquez-moi !</button>
        <p id="message">Nombre de clics : <span id="counter">0</span></p>
    </div>
    <script>
        let count = 0;
        document.getElementById('actionBtn').addEventListener('click', () => {
            count++;
            document.getElementById('counter').innerText = count;
        });
    </script>
</body>
</html>
