<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Projet Azure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="https://testazurestorageoxylmars.blob.core.windows.net/images/rocket.png" alt="Illustration Cloud" style="width: 180px; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        <h1>🚀 Mon Premier Déploiement Azure !</h1>
        <p>Ceci est un petit projet pour apprendre à déployer gratuitement sur Microsoft Azure.</p>
        <button id="actionBtn">Cliquez-moi !</button>
        <p id="message">Nombre de clics : <span id="counter">0</span></p>
        <p id="secretMessage" style="font-size: 0.9em; opacity: 0.8; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px;"></p>
    </div>
    <script>
        let count = 0;
        document.getElementById('actionBtn').addEventListener('click', () => {
            count++;
            document.getElementById('counter').innerText = count;
        });

        // Récupère le message secret depuis notre API Node.js
        fetch('/api/message')
            .then(response => response.json())
            .then(data => {
                document.getElementById('secretMessage').innerText = data.message;
            })
            .catch(error => {
                document.getElementById('secretMessage').innerText = "Impossible de charger le message secret.";
            });
    </script>
</body>
</html>
